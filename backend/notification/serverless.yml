org: persii
app: esquad-monorepo
service: service-notification
frameworkVersion: '^3.15.0'

provider:
  name: aws
  runtime: nodejs20.x
  region: ${env:REGION}
  environment:
    STORAGE_DYNAMODB_TABLE: ${env:METADATA_TABLE}
    TEAM_DYNAMODB_TABLE: ${env:TEAM_TABLE}
    NOTIFICATION_DYNAMODB_TABLE: ${env:NOTIFICATION_TABLE}
    SNS_TOPIC_PREFIX: StudyPageStorageTopic
    AWS_ACCOUNT_ID: ${env:AWS_ACCOUNT_ID}

functions:
  storageDBEventHandler:
    handler: ./service/storageEventHandler.handler # Lambda 핸들러 함수
    environment:
      STORAGE_TABLE: ${self:provider.environment.STORAGE_DYNAMODB_TABLE}
      TEAM_TABLE: ${self:provider.environment.TEAM_DYNAMODB_TABLE}
      NOTIFICATIONS_TABLE: ${self:provider.environment.NOTIFICATION_DYNAMODB_TABLE}
      SNS_TOPIC_PREFIX: ${self:provider.environment.SNS_TOPIC_PREFIX}
    events:
      - stream:
          type: dynamodb # DynamoDB Streams 트리거
          arn: arn:aws:dynamodb:${env:REGION}:${env:AWS_ACCOUNT_ID}:table/${env:STORAGE_TABLE}/stream/label
          batchSize: 5              # 스트림 배치 처리 크기
          startingPosition: LATEST  # 최신 이벤트부터 시작

resources:
  Resources:
    # DynamoDB 테이블 정의
    NotificationsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.NOTIFICATION_DYNAMODB_TABLE}
        AttributeDefinitions:
        - AttributeName: notificationId
          AttributeType: S
        KeySchema:
          - AttributeName: notificationId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST


    TeamSNSTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: ${self:provider.environment.SNS_TOPIC_PREFIX}

  Outputs:
    TeamFilesStreamARN:
      Description: ARN of the DynamoDB Stream
      Value:
        Fn::GetAtt: [TeamFilesTable, StreamArn]
    SNSTopicARN:
      Description: ARN of the SNS Topic
      Value:
        Ref: TeamSNSTopic

plugins:
  - serverless-offline # 로컬 개발용 플러그인